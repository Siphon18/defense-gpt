services:
  - type: web
    name: defense-gpt-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6
